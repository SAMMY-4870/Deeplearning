task_type: video
DATA_ROOT: ./data/videos
output_dir: ./outputs/video_cnn_lstm
seed: 42
num_workers: 4
use_amp: true

model:
  backbone: xception
  pretrained: true
  in_chans: 3
  feature_dim: 2048  # set automatically when using timm backbone (kept for reference)
  lstm_hidden: 512
  lstm_layers: 1
  bidirectional: false
  dropout: 0.3
  num_classes: 1

train:
  epochs: 8
  batch_size: 4
  lr: 3e-4
  weight_decay: 1e-4
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 1
  label_smoothing: 0.0

video:
  num_frames: 16
  frame_stride: auto  # auto = uniform sampling across the clip
  image_size: 224

augment:
  hflip_prob: 0.5

paths:
  train: train
  val: val
  test: test